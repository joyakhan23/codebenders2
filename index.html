<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Advanced Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #fff;
      display: flex;
    }

    /* Sidebar */
    .sidebar {
      width: 240px;
      background: #020617;
      height: 100vh;
      padding: 20px;
      transition: 0.3s;
    }

    .sidebar h2 {
      text-align: center;
      margin-bottom: 30px;
    }

    .sidebar ul {
      list-style: none;
      padding: 0;
    }

    .sidebar ul li {
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }

    .sidebar ul li:hover {
      background: #1e293b;
    }

    /* Main */
    .main {
      flex: 1;
      padding: 20px;
    }

    /* Top Navbar */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #020617;
      padding: 15px 20px;
      border-radius: 10px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card h3 {
      margin-bottom: 10px;
      color: #94a3b8;
    }

    .card p {
      font-size: 26px;
      font-weight: bold;
    }

    /* Chart */
    .chart-container {
      margin-top: 30px;
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
    }

    /* Table */
    .table {
      margin-top: 30px;
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 12px;
      text-align: left;
    }

    th {
      color: #94a3b8;
    }

    tr {
      border-bottom: 1px solid #334155;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar {
        display: none;
      }
    }
  </style>
</head>
<body>

  <div class="sidebar">
    <h2>🚀 Admin</h2>
    <ul>
      <li>Dashboard</li>
      <li>Analytics</li>
      <li>Users</li>
      <li>Reports</li>
      <li>Settings</li>
    </ul>
  </div>

  <div class="main">
    <div class="navbar">
      <h2>Dashboard</h2>
      <span>👤 User | 🔔</span>
    </div>

    <!-- Cards -->
    <div class="cards">
      <div class="card">
        <h3>Users</h3>
        <p>1,245</p>
      </div>
      <div class="card">
        <h3>Revenue</h3>
        <p>$8,560</p>
      </div>
      <div class="card">
        <h3>Orders</h3>
        <p>320</p>
      </div>
      <div class="card">
        <h3>Growth</h3>
        <p>+15%</p>
      </div>
    </div>

    <!-- Chart -->
    <div class="chart-container">
      <h3>Monthly Sales</h3>
      <canvas id="myChart"></canvas>
    </div>

    <!-- Table -->
    <div class="table">
      <h3>Recent Activity</h3>
      <table>
        <tr>
          <th>Name</th>
          <th>Status</th>
          <th>Date</th>
        </tr>
        <tr>
          <td>John</td>
          <td>Completed</td>
          <td>28 Apr 2026</td>
        </tr>
        <tr>
          <td>Mary</td>
          <td>Pending</td>
          <td>27 Apr 2026</td>
        </tr>
        <tr>
          <td>Alex</td>
          <td>Failed</td>
          <td>26 Apr 2026</td>
        </tr>
      </table>
    </div>

  </div>

  <script>
    const ctx = document.getElementById('myChart');

    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May'],
        datasets: [{
          label: 'Sales',
          data: [120, 190, 300, 250, 220],
        }]
      }
    });
  </script>

</body>
</html>

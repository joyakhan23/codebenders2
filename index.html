<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      background: #f4f6f9;
    }

    /* Sidebar */
    .sidebar {
      width: 220px;
      height: 100vh;
      background: #2c3e50;
      color: #fff;
      padding: 20px;
    }

    .sidebar h2 {
      margin-bottom: 30px;
      text-align: center;
    }

    .sidebar ul {
      list-style: none;
    }

    .sidebar ul li {
      padding: 12px;
      margin: 10px 0;
      background: #34495e;
      border-radius: 5px;
      cursor: pointer;
    }

    .sidebar ul li:hover {
      background: #1abc9c;
    }

    /* Main Content */
    .main {
      flex: 1;
      padding: 20px;
    }

    .header {
      background: #fff;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .card {
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .card h3 {
      margin-bottom: 10px;
    }

    .card p {
      font-size: 24px;
      font-weight: bold;
      color: #2c3e50;
    }

    .table {
      margin-top: 20px;
      background: #fff;
      padding: 20px;
      border-radius: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    table th, table td {
      padding: 10px;
      text-align: left;
      border-bottom: 1px solid #ddd;
    }

    table th {
      background: #ecf0f1;
    }
  </style>
</head>
<body>

  <div class="sidebar">
    <h2>Dashboard</h2>
    <ul>
      <li>Home</li>
      <li>Analytics</li>
      <li>Users</li>
      <li>Settings</li>
    </ul>
  </div>

  <div class="main">
    <div class="header">
      <h2>Welcome User</h2>
      <span>🔔 Notifications</span>
    </div>

    <div class="cards">
      <div class="card">
        <h3>Total Users</h3>
        <p>1,245</p>
      </div>
      <div class="card">
        <h3>Revenue</h3>
        <p>$8,560</p>
      </div>
      <div class="card">
        <h3>Orders</h3>
        <p>320</p>
      </div>
    </div>

    <div class="table">
      <h3>Recent Activity</h3>
      <table>
        <tr>
          <th>Name</th>
          <th>Status</th>
          <th>Date</th>
        </tr>
        <tr>
          <td>John</td>
          <td>Completed</td>
          <td>28 Apr 2026</td>
        </tr>
        <tr>
          <td>Mary</td>
          <td>Pending</td>
          <td>27 Apr 2026</td>
        </tr>
      </table>
    </div>
  </div>

</body>
</html>
